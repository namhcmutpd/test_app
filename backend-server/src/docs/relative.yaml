tags:
  - name: Relatives
    description: Quản lý danh bạ người thân khẩn cấp

paths:
  /relatives:
    get:
      summary: Lấy danh sách người thân
      tags: [Relatives]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lấy danh sách thành công

    post:
      summary: Thêm người thân mới
      tags: [Relatives]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contact_name
                - phone_num
                - relationship
              properties:
                contact_name:
                  type: string
                  example: "Mẹ"
                phone_num:
                  type: string
                  example: "0987654321"
                relationship:
                  type: string
                  example: "Mother"
      responses:
        201:
          description: Thêm người thân thành công

  /relatives/{id}:
    patch:
      summary: Cập nhật thông tin người thân
      tags: [Relatives]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID của người thân cần cập nhật
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_name:
                  type: string
                  example: "Bố"
                  nullable: true
                phone_num:
                  type: string
                  example: "0987654321"
                  nullable: true
                relationship:
                  type: string
                  example: "Father"
                  nullable: true
      responses:
        200:
          description: Cập nhật thành công

    delete:
      summary: Xóa người thân
      tags: [Relatives]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID của người thân cần xóa
          schema:
            type: string
      responses:
        200:
          description: Xóa thành công