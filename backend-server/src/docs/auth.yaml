tags:
  - name: Auth
    description: Các API quản lý xác thực người dùng

paths:
  /auth/google:
    post:
      summary: Đăng nhập bằng Google
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id_token:
                  type: string
                  example: eyJhbGci...
      responses:
        200:
          description: Đăng nhập thành công

  /auth/registerUser:
    post:
      summary: Đăng ký tài khoản mới
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - confirm_password
                - full_name
              properties:
                email:
                  type: string
                  example: nguyenvanA@gmail.com
                password:
                  type: string
                  example: Password123
                confirm_password:
                  type: string
                  example: Password123
                full_name:
                  type: string
                  example: Nguyen Van A
      responses:
        201:
          description: Đăng ký thành công

  /auth/login:
    post:
      summary: Đăng nhập hệ thống
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: nguyenvanA@gmail.com
                password:
                  type: string
                  example: Password123
      responses:
        200:
          description: Đăng nhập thành công

  /auth/forgot-password:
    post:
      summary: Gửi OTP reset password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: nguyenvanA@gmail.com
      responses:
        200:
          description: Đã gửi OTP

  /auth/reset-password:
    post:
      summary: Reset password bằng OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                otp:
                  type: string
                  example: 123456
                new_password:
                  type: string
                  example: NewPassword123
      responses:
        200:
          description: Reset thành công
